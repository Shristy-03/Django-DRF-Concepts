<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Task Manager</h1>

    <form id="taskForm">

        <input
            type="text"
            id="title"
            placeholder="Enter Task Title"
            required
        >

        <textarea
            id="description"
            placeholder="Enter Description"
            required
        ></textarea>

        <input
            type="date"
            id="due_date"
            required
        >

        <select id="status">

            <option value="pending">Pending</option>

            <option value="in_progress">
                In Progress
            </option>

            <option value="completed">
                Completed
            </option>

        </select>

        <button type="submit">
            Add Task
        </button>

    </form>

    <hr>

    <h2>All Tasks</h2>

    <div id="tasks"></div>

</div>

<script src="script.js"></script>

</body>
</html>
